name: Build & Release (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: false
        default: "all"
        type: choice
        options: [all, mac, windows, linux]

env:
  NODE_VERSION: "20"

jobs:
  build-mac:
    if: inputs.platform == 'all' || inputs.platform == 'mac'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: |
          brew install --quiet sevenzip
          npm install -g @electron/asar
      - run: node scripts/sync-upstream.js --force
      - run: node scripts/patch-all.js
      - run: npm run build:mac-${{ matrix.arch }}
        env:
          SKIP_SIGN: "true"
          SKIP_NOTARIZE: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: |
            out/make/*.dmg
            out/make/zip/**/*.zip

  build-windows:
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: |
          choco install 7zip -y
          npm install -g @electron/asar
      - run: node scripts/sync-upstream.js --force
      - run: node scripts/patch-all.js
      - run: npm run build:win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-Windows-x64
          path: |
            out/make/squirrel.windows/**/*
            out/make/zip/**/*.zip

  build-linux:
    if: inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg p7zip-full
          npm install -g @electron/asar
      - run: node scripts/sync-upstream.js --force
      - run: node scripts/patch-all.js
      - run: npm run build:linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
