name: Sync Upstream & Patch

on:
  schedule:
    - cron: "0 8 * * *" # Daily 08:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even without version change"
        type: boolean
        default: false

env:
  NODE_VERSION: "20"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check upstream versions
        id: detect
        run: |
          set +e
          node scripts/check-update.js --json --force 2>&1
          exit_code=$?
          set -e

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          elif [ $exit_code -eq 0 ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "No upstream update detected."
          fi

  # ──────────────────────────────────────────────
  # Each platform: sync + patch + build in one job
  # (src/ is gitignored, so it must be generated per-runner)
  # ──────────────────────────────────────────────
  build-mac:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install @cometix/codex@latest

      - name: Install tools
        run: |
          brew install --quiet sevenzip
          npm install -g @electron/asar

      - name: Sync upstream
        run: node scripts/sync-upstream.js --force

      - name: Patch
        run: node scripts/patch-all.js

      - name: Build
        run: npm run build:mac-${{ matrix.arch }}
        env:
          SKIP_SIGN: "true"
          SKIP_NOTARIZE: "true"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: |
            out/make/*.dmg
            out/make/zip/**/*.zip
          if-no-files-found: error

  build-windows:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install @cometix/codex@latest

      - name: Install tools
        run: |
          choco install 7zip -y
          npm install -g @electron/asar

      - name: Sync upstream
        run: node scripts/sync-upstream.js --force

      - name: Patch
        run: node scripts/patch-all.js

      - name: Build
        run: npm run build:win-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Windows-x64
          path: |
            out/make/squirrel.windows/**/*
            out/make/zip/**/*.zip
          if-no-files-found: error

  build-linux:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg p7zip-full

      - name: Install dependencies
        run: |
          npm ci
          npm install @cometix/codex@latest

      - name: Install tools
        run: npm install -g @electron/asar

      - name: Sync upstream
        run: node scripts/sync-upstream.js --force

      - name: Patch
        run: node scripts/patch-all.js

      - name: Build
        run: npm run build:linux-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Bump version + tag + release
  # ──────────────────────────────────────────────
  release:
    needs: [build-mac, build-windows, build-linux]
    if: always() && needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Sync upstream (for version info only)
        run: node scripts/sync-upstream.js --force --skip-win

      - name: Bump version and tag
        id: version
        run: |
          VERSION=$(node scripts/bump-version.js)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json scripts/.versions.json
          git diff --cached --quiet && echo "No version change" && exit 0

          git commit -m "Bump version to ${VERSION}"
          git tag -a "v${VERSION}" -m "Codex ${VERSION}"
          git push origin HEAD --tags

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
